<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Flexbox Cards</h1>

    <div class="container">

        <div class="card">
            <img src="https://picsum.photos/300/200?1" alt="Image">
            <h2>Web Development</h2>
            <p>Learn HTML, CSS, JavaScript and build amazing websites.</p>
            <button>Read More</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?2" alt="Image">
            <h2>Python Programming</h2>
            <p>Master Python for automation, AI, and software development.</p>
            <button>Read More</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/200?3" alt="Image">
            <h2>Data Structures</h2>
            <p>Improve problem-solving skills and crack coding interviews.</p>
            <button>Read More</button>
        </div>

    </div>

</body>
</html>
<style>
    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 40px;
}

h1{
    text-align: center;
    margin-bottom: 30px;
}

.container{
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card{
    width: 300px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover{
    transform: translateY(-10px);
}

.card img{
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card h2{
    padding: 15px;
}

.card p{
    padding: 0 15px 15px;
}

.card button{
    margin: 15px;
    padding: 10px 20px;
    border: none;
    background: #007bff;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.card button:hover{
    background: #0056b3;
}
</style>
